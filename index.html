<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KE's Warehouse</title>
    <style>
        :root { --accent-color: #FFE3B3; --text-color: #ffffff; }
        
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            position: fixed; 
            overflow: hidden; 
            overscroll-behavior: none; 
            background-color: #030307; 
            color: white; 
            font-family: -apple-system, sans-serif; 
            -webkit-overflow-scrolling: touch; 
        }
        
        #bg-canvas, #top-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #bg-canvas { z-index: 0; }
        #top-canvas { z-index: 50; } 
        
        .content-layer { position: relative; z-index: 60; width: 100%; min-height: 100vh; pointer-events: none; }
        
        nav, .page { pointer-events: auto; }
        
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; z-index: 100; padding: 30px 0; background: linear-gradient(to bottom, rgba(3,3,7,1), rgba(3,3,7,0)); }
        nav button { background: none; border: none; color: #888; padding: 0 20px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; letter-spacing: 2px; }
        nav button.active, nav button:hover { color: var(--accent-color); text-shadow: 0 0 15px rgba(255,227,179,0.6); }
        
        .page { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            padding-top: 150px; 
            text-align: center; 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(0.97) translateY(15px); 
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity, transform; 
        }
        
        .page.active { 
            opacity: 1; 
            pointer-events: auto; 
            transform: scale(1) translateY(0); 
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 20px 40px 60px 40px; 
            max-width: 1000px; 
            margin: 0 auto; 
            max-height: calc(100vh - 240px); 
            overflow-y: auto; 
            overscroll-behavior: contain; 
            -webkit-overflow-scrolling: touch;
        }
        .grid::-webkit-scrollbar { display: none; }
        
        .card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 20px; 
            padding: 30px; 
            cursor: pointer; 
            touch-action: auto; 
            transform: translateZ(0); 
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease, background-color 0.3s ease; 
        }
        .card:hover { border-color: var(--accent-color); background: rgba(255, 227, 179, 0.06); transform: translateY(-5px); box-shadow: 0 0 25px rgba(255,227,179,0.15); }

        .photo-card {
            background-size: cover;
            background-position: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 0 !important; 
        }
        .photo-card-overlay {
            width: 100%;
            padding: 20px 0;
            background: linear-gradient(to top, rgba(3,3,7,0.85) 0%, rgba(3,3,7,0) 100%);
            text-align: center;
            pointer-events: none;
            z-index: 2;
        }
        
        /* =========================================================
           👇 电影级灯箱动效优化区域
           ========================================================= */
        #lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 7, 0.45); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 200; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; 
            /* 蒙层渐变稍微加快一点，为图片出现做铺垫 */
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #lightbox-overlay.active { opacity: 1; pointer-events: auto; }
        
        #lightbox-img {
            max-width: 90%; max-height: 82%; object-fit: contain; border-radius: 16px;
            /* 🌟 初始收起状态：阴影收拢、透明度为 0、稍微下沉、带有光学模糊 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.0), 0 0 0px rgba(255,255,255,0);
            transform: scale(0.85) translateY(30px);
            opacity: 0;
            filter: blur(8px);
            /* 丝滑的贝塞尔曲线缓冲，延展时间到 0.6s 更有呼吸感 */
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        #lightbox-overlay.active #lightbox-img { 
            /* 🌟 点击展开状态：阴影张开绽放、大小恢复原样、回到中心位置、画面变清晰 */
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 1px rgba(255,255,255,0.3);
            transform: scale(1) translateY(0);
            opacity: 1;
            filter: blur(0px);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="top-canvas"></canvas>

    <div class="content-layer">
        <nav>
            <button onclick="window.switchPage('home')" id="btn-home" class="active">INDEX</button>
            <button onclick="window.switchPage('works')" id="btn-works">PROJECTS</button>
        </nav>

        <div id="home" class="page active">
            <h1 style="font-size: 4rem; letter-spacing: 12px; margin: 0; font-weight: 300; background: linear-gradient(135deg, #fff 30%, #FFE3B3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">KE'S Warehouse</h1>
            <p style="color: #555; margin-top: 12px; letter-spacing: 4px; font-size: 13px; text-transform: uppercase;">Aerodynamics & Structure Design</p>
        </div>

        <div id="works" class="page">
            <div class="grid">
                <div class="card" onclick="alert('Electric Motorcycle Analysis')"><h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px;">Electric Motorcycle</h3></div>
                <div class="card" onclick="alert('Modular Storage System')"><h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px;">Modular Storage</h3></div>
                
                <div class="card photo-card" style="background-image: url('./images/9c7d0954bc69ba19df3e73a3964ef35a.jpeg');" onclick="openLightbox('./images/9c7d0954bc69ba19df3e73a3964ef35a.jpeg')">
                    <div class="photo-card-overlay">
                        <h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px; margin:0; font-size:14px;">PROJECT 01</h3>
                    </div>
                </div>

                <div class="card photo-card" style="background-image: url('./images/944.png');" onclick="openLightbox('./images/944.png')">
                    <div class="photo-card-overlay">
                        <h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px; margin:0; font-size:14px;">PROJECT 02</h3>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="lightbox-overlay" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Enlarged View">
    </div>

    <script>
        window.switchPage = function(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.getElementById('btn-'+p).classList.add('active');
        };

        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const topCanvas = document.getElementById('top-canvas');
        const topCtx = topCanvas.getContext('2d');

        const dpr = window.devicePixelRatio || 1;
        let w = window.innerWidth;
        let h = window.innerHeight;

        function initCanvasSize() {
            w = window.innerWidth;
            h = window.innerHeight;
            bgCanvas.width = topCanvas.width = w * dpr;
            bgCanvas.height = topCanvas.height = h * dpr;
            bgCanvas.style.width = topCanvas.style.width = w + 'px';
            bgCanvas.style.height = topCanvas.style.height = h + 'px';
            bgCtx.scale(dpr, dpr);
            topCtx.scale(dpr, dpr);
        }
        initCanvasSize();
        window.addEventListener('resize', initCanvasSize);

        const particles = [];
        const totalParticles = 6000; 
        
        const colors = [
            '#FFE3B3', '#FFC563', '#0099FF', '#00FFFF', '#FFFFFF', 
            'rgba(255, 227, 179, 0.95)', 'rgba(0, 255, 255, 0.95)'
        ];
        
        let globalTime = 0;
        let lastTime = performance.now();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w; 
                this.y = Math.random() * h;
                
                const sizeRand = Math.random();
                if (sizeRand > 0.8) {
                    this.width = Math.random() * 6 + 4;  
                    this.height = Math.random() * 1.5 + 0.8;
                    this.velocity = Math.random() * 0.5 + 0.2;
                } else {
                    this.width = Math.random() * 3 + 1.5;    
                    this.height = Math.random() * 0.8 + 0.4;
                    this.velocity = Math.random() * 0.7 + 0.4; 
                }
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.rotation = Math.random() * Math.PI * 2;
                this.angle = Math.random() * Math.PI * 2;
                
                this.ix = 0;
                this.iy = 0;
                this.alpha = 0; 
            }
            
            update(mouse, time, dt, breathingRadius, currentFriction) {
                if (this.alpha < 1) this.alpha += 0.008 * dt; 

                let flowDirX = Math.sin(time * 0.0007) * 1.5;
                let flowDirY = Math.cos(time * 0.0005 + 1.0) * 1.2;
                this.angle = Math.sin(this.x * 0.0025 + flowDirX) + Math.cos(this.y * 0.0025 + flowDirY);

                let baseVx = Math.cos(this.angle) * this.velocity;
                let baseVy = Math.sin(this.angle) * this.velocity;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < breathingRadius && dist > 1) {
                    let force = (breathingRadius - dist) / breathingRadius; 
                    
                    let dirX = dx / dist;
                    let dirY = dy / dist;
                    
                    let pullStrength = force * 0.58; 
                    this.ix += dirX * pullStrength * dt;
                    this.iy += dirY * pullStrength * dt;
                    
                    let coreFriction = Math.pow(0.968 - (0.09 * force), dt);
                    this.ix *= coreFriction;
                    this.iy *= coreFriction;
                    
                    baseVx *= (1 - force * 0.85);
                    baseVy *= (1 - force * 0.85);
                } else {
                    this.ix *= currentFriction; 
                    this.iy *= currentFriction;
                }

                this.x += (baseVx + this.ix) * dt;
                this.y += (baseVy + this.iy) * dt;

                if(this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
                
                this.rotation += (0.015 + (Math.abs(this.ix) + Math.abs(this.iy)) * 0.004) * dt;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                ctx.restore();
            }
        }

        for (let i = 0; i < totalParticles; i++) particles.push(new Particle());

        let mouse = { x: -2000, y: -2000 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => { 
            const t = e.touches[0]; mouse.x = t.clientX; mouse.y = t.clientY; 
        }, { passive: true });

        window.addEventListener('touchend', () => { window.scrollTo(0, 0); });

        function animate() {
            let currentTime = performance.now();
            let dt = (currentTime - lastTime) / 16.666;
            
            if (dt > 2.0 || dt < 0.1 || isNaN(dt)) dt = 1.0; 
            lastTime = currentTime;

            globalTime += dt;
            
            bgCtx.fillStyle = 'rgba(3, 3, 7, 0.12)';
            bgCtx.fillRect(0, 0, w, h);
            
            topCtx.globalCompositeOperation = 'lighter';
            topCtx.clearRect(0, 0, w, h);

            let breathingRadius = 160 + Math.sin(globalTime * 0.002) * 90;
            let currentFriction = Math.pow(0.968, dt);

            particles.forEach(p => {
                p.update(mouse, globalTime, dt, breathingRadius, currentFriction);
                p.draw(topCtx);
            });

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        function openLightbox(url) {
            const overlay = document.getElementById('lightbox-overlay');
            const img = document.getElementById('lightbox-img');
            img.src = url;
            overlay.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox-overlay').classList.remove('active');
        }
    </script>
</body>
</html>
