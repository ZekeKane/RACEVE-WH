<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeke's Design Studio</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8fafc; font-family: sans-serif; }
        #bg-canvas, #top-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #bg-canvas { z-index: 0; }
        .glass-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255,255,255,0.05); }
        #top-canvas { z-index: 50; pointer-events: none; }
        
        /* 保持原有布局不变 */
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; background: rgba(255,255,255,0.3); backdrop-filter: blur(10px); z-index: 100; padding: 20px 0; }
        button { background: none; border: none; color: #4b5563; padding: 0 20px; cursor: pointer; font-weight: 600; }
        button.active { color: #0055ff; }
        .page { display: none; height: 100vh; padding-top: 150px; text-align: center; position: relative; z-index: 10; }
        .page.active { display: block; }
        h1 { font-size: 3.5rem; color: #111115; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="glass-background"></div>
    <canvas id="top-canvas"></canvas>

    <nav>
        <button onclick="switchPage('home')" id="btn-home" class="active">INDEX</button>
        <button onclick="switchPage('works')" id="btn-works">PROJECTS</button>
    </nav>

    <div id="home" class="page active">
        <h1>ZEKE'S STUDIO</h1>
        <p>Exploring the Dynamic Intersection of Product, Structure & Aerodynamics</p>
    </div>

    <script>
        function switchPage(p) { /* 省略原有切换逻辑，保持功能完整 */ }

        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d', { alpha: false }); // 优化性能
        const topCanvas = document.getElementById('top-canvas');
        const topCtx = topCanvas.getContext('2d');

        let w = bgCanvas.width = topCanvas.width = window.innerWidth;
        let h = bgCanvas.height = topCanvas.height = window.innerHeight;

        const particles = [];
        // 🚀 11倍规模粒子群
        const totalParticles = 13000; 

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 0.4 + 0.1; // 缩小90%
                this.baseX = this.x;
                this.baseY = this.y;
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 0.2 + 0.1;
                this.color = `rgba(${Math.random()*100+150}, ${Math.random()*100+150}, 255, 0.6)`;
            }
            update(mouse) {
                // 丝绸流动算法：利用正弦波产生秩序感
                this.angle += 0.02;
                this.x += Math.cos(this.angle) * this.velocity;
                this.y += Math.sin(this.angle) * this.velocity;

                // 强大的磁力吸附
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 500) { // 扩大半径
                    let force = (500 - dist) / 500;
                    this.x += dx * force * 0.15; // 速度提升
                    this.y += dy * force * 0.15;
                }

                if(this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < totalParticles; i++) particles.push(new Particle());

        let mouse = { x: -1000, y: -1000 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function animate() {
            // 背景层使用半透明叠加产生拖尾
            bgCtx.fillStyle = 'rgba(248, 250, 252, 0.15)';
            bgCtx.fillRect(0, 0, w, h);
            topCtx.clearRect(0, 0, w, h);

            particles.forEach(p => {
                p.update(mouse);
                // 底层绘制丝绸流体，顶层绘制高亮尘埃
                p.draw(p.size > 0.3 ? topCtx : bgCtx);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
