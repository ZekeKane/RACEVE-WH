<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zeke's Design Studio</title>
    <style>
        :root { --glass-color: rgba(255, 255, 255, 0.1); --text-color: #ffffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050508; color: white; font-family: 'Inter', system-ui, sans-serif; }
        
        /* 背景水波光影层 */
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; filter: blur(40px); }
        
        /* 玻璃磨砂质感卡片 */
        .content-layer { position: relative; z-index: 60; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        
        nav { position: fixed; top: 40px; display: flex; gap: 20px; pointer-events: auto; }
        nav button { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 12px 30px; cursor: pointer; border-radius: 50px; backdrop-filter: blur(10px); transition: 0.4s; }
        nav button:hover, nav button.active { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.3); }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        h1 { font-size: 4rem; letter-spacing: 5px; margin-bottom: 10px; font-weight: 300; }
        p { color: rgba(255,255,255,0.6); letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content-layer">
        <nav>
            <button onclick="window.switchPage('home')" id="btn-home" class="active">STUDIO</button>
            <button onclick="window.switchPage('works')">WORKS</button>
        </nav>

        <div id="home" class="glass-card">
            <h1>ZEKE'S</h1>
            <p>Fluidity & Transparency</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        // 模拟水底焦散的光斑
        const blobs = [];
        class Blob {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 200 + 100;
                // 使用极其清透的蓝/白光色
                const colors = ['rgba(100, 200, 255, 0.3)', 'rgba(200, 230, 255, 0.2)', 'rgba(255, 255, 255, 0.1)'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < -200 || this.x > w + 200) this.vx *= -1;
                if (this.y < -200 || this.y > h + 200) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 8; i++) blobs.push(new Blob());

        function animate() {
            ctx.fillStyle = '#050508'; // 深海背景色
            ctx.fillRect(0, 0, w, h);
            
            // 混合模式：这里使用 lighten 让光斑叠加产生“水底明亮”感
            ctx.globalCompositeOperation = 'screen';
            
            blobs.forEach(b => {
                b.update();
                b.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
