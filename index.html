<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zeke's Design Studio</title>
    <style>
        :root { --accent-color: #E6C794; --text-color: #ffffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; overflow-y: auto; background-color: #030307; color: white; font-family: -apple-system, sans-serif; -webkit-overflow-scrolling: touch; }
        
        #bg-canvas, #top-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #bg-canvas { z-index: 0; }
        #top-canvas { z-index: 50; } 
        
        .content-layer { position: relative; z-index: 60; width: 100%; min-height: 100vh; pointer-events: none; }
        
        nav, .page { pointer-events: auto; }
        
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; z-index: 100; padding: 30px 0; background: linear-gradient(to bottom, rgba(3,3,7,1), rgba(3,3,7,0)); }
        nav button { background: none; border: none; color: #888; padding: 0 20px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; letter-spacing: 2px; }
        nav button.active, nav button:hover { color: var(--accent-color); text-shadow: 0 0 15px rgba(230,199,148,0.6); }
        
        .page { display: none; padding-top: 150px; text-align: center; width: 100%; }
        .page.active { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px; max-width: 1000px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 30px; cursor: pointer; transition: 0.4s; touch-action: auto; backdrop-filter: blur(10px); }
        .card:hover { border-color: var(--accent-color); background: rgba(230, 199, 148, 0.08); transform: translateY(-5px); box-shadow: 0 0 20px rgba(230,199,148,0.1); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="top-canvas"></canvas>

    <div class="content-layer">
        <nav>
            <button onclick="window.switchPage('home')" id="btn-home" class="active">INDEX</button>
            <button onclick="window.switchPage('works')" id="btn-works">PROJECTS</button>
        </nav>

        <div id="home" class="page active">
            <h1 style="font-size: 4rem; letter-spacing: 12px; margin: 0; font-weight: 300; background: linear-gradient(135deg, #fff 30%, #E6C794 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ZEKE'S STUDIO</h1>
            <p style="color: #555; margin-top: 12px; letter-spacing: 4px; font-size: 13px; text-transform: uppercase;">Aerodynamics & Structure Design</p>
        </div>

        <div id="works" class="page">
            <div class="grid">
                <div class="card" onclick="alert('Electric Motorcycle Analysis')"><h3 style="color: #E6C794;">Electric Motorcycle</h3></div>
                <div class="card" onclick="alert('Modular Storage System')"><h3 style="color: #E6C794;">Modular Storage</h3></div>
            </div>
        </div>
    </div>

    <script>
        window.switchPage = function(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.getElementById('btn-'+p).classList.add('active');
        };

        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const topCanvas = document.getElementById('top-canvas');
        const topCtx = topCanvas.getContext('2d');

        let w = bgCanvas.width = topCanvas.width = window.innerWidth;
        let h = bgCanvas.height = topCanvas.height = window.innerHeight;

        const particles = [];
        const totalParticles = 6500; // 略微增加密度让星河更璀璨
        
        // 🌌 奢华深空配色矩阵：香槟金、古铜金、星空蓝、极光青、高光白
        const colors = [
            '#E6C794', '#C5A059', '#0066FF', '#00F2FF', '#FFFFFF', 
            'rgba(230, 199, 148, 0.8)', 'rgba(0, 242, 255, 0.8)'
        ];
        let globalTime = 0;

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w; 
                this.y = Math.random() * h;
                
                // 让粒子有大小分层，大粒子像近处的星体，极小粒子像远处的星尘背景
                const sizeRand = Math.random();
                if (sizeRand > 0.85) {
                    this.width = Math.random() * 4 + 2.5;  // 耀眼金/蓝流
                    this.height = Math.random() * 1 + 0.6;
                    this.velocity = Math.random() * 0.4 + 0.15;
                } else {
                    this.width = Math.random() * 2 + 1;    // 细腻微光星尘（Shiny 的关键）
                    this.height = Math.random() * 0.6 + 0.3;
                    this.velocity = Math.random() * 0.6 + 0.3; // 小粒子流动稍快
                }
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.rotation = Math.random() * Math.PI * 2;
                this.angle = Math.random() * Math.PI * 2;
                
                this.ix = 0;
                this.iy = 0;
                this.alpha = 0; 
            }
            update(mouse, time) {
                if (this.alpha < 1) {
                    this.alpha += 0.004; // 优雅浮现
                }

                // 宇宙引力波场动：让波纹形态更加深邃宏大
                this.angle = Math.sin(time * 0.0008 + this.x * 0.0015) * Math.PI;
                let baseVx = Math.cos(this.angle) * this.velocity;
                let baseVy = Math.sin(this.angle) * this.velocity;

                let breathingRadius = 160 + Math.sin(time * 0.002) * 90;
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < breathingRadius) {
                    let force = (breathingRadius - dist) / breathingRadius;
                    this.ix += dx * force * 0.0025; 
                    this.iy += dy * force * 0.0025;
                }

                this.ix *= 0.94; // 阻尼感微调，让漂移更丝滑
                this.iy *= 0.94;

                this.x += baseVx + this.ix;
                this.y += baseVy + this.iy;

                if(this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
                
                this.rotation += 0.015 + (Math.abs(this.ix) + Math.abs(this.iy)) * 0.004;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                
                // 炫光叠加强调
                ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                ctx.restore();
            }
        }

        for (let i = 0; i < totalParticles; i++) particles.push(new Particle());

        let mouse = { x: -2000, y: -2000 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => { 
            const t = e.touches[0]; mouse.x = t.clientX; mouse.y = t.clientY; 
        }, { passive: true });

        function animate() {
            globalTime++;
            
            // 降低残影底色透明度（0.1 -> 0.07），让粒子的亮线拉得更长更 Shiny，像流星划过
            bgCtx.fillStyle = 'rgba(3, 3, 7, 0.07)';
            bgCtx.fillRect(0, 0, w, h);
            
            topCtx.globalCompositeOperation = 'lighter';
            topCtx.clearRect(0, 0, w, h);

            particles.forEach(p => {
                p.update(mouse, globalTime);
                p.draw(topCtx);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
