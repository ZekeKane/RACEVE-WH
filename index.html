<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zeke's Design Studio</title>
    <style>
        :root { --accent-color: #FFE3B3; --text-color: #ffffff; }
        
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            position: fixed; 
            overflow: hidden; 
            overscroll-behavior: none; 
            background-color: #030307; 
            color: white; 
            font-family: -apple-system, sans-serif; 
            -webkit-overflow-scrolling: touch; 
        }
        
        #bg-canvas, #top-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #bg-canvas { z-index: 0; }
        #top-canvas { z-index: 50; } 
        
        .content-layer { position: relative; z-index: 60; width: 100%; min-height: 100vh; pointer-events: none; }
        
        nav, .page { pointer-events: auto; }
        
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; z-index: 100; padding: 30px 0; background: linear-gradient(to bottom, rgba(3,3,7,1), rgba(3,3,7,0)); }
        nav button { background: none; border: none; color: #888; padding: 0 20px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; letter-spacing: 2px; }
        nav button.active, nav button:hover { color: var(--accent-color); text-shadow: 0 0 15px rgba(255,227,179,0.6); }
        
        .page { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            padding-top: 150px; 
            text-align: center; 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(0.97) translateY(15px); 
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity, transform; 
        }
        
        .page.active { 
            opacity: 1; 
            pointer-events: auto; 
            transform: scale(1) translateY(0); 
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 20px 40px 60px 40px; 
            max-width: 1000px; 
            margin: 0 auto; 
            max-height: calc(100vh - 240px); 
            overflow-y: auto; 
            overscroll-behavior: contain; 
            -webkit-overflow-scrolling: touch;
        }
        .grid::-webkit-scrollbar { display: none; }
        
        .card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 20px; 
            padding: 30px; 
            cursor: pointer; 
            touch-action: auto; 
            transform: translateZ(0); 
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease, background-color 0.3s ease; 
        }
        .card:hover { border-color: var(--accent-color); background: rgba(255, 227, 179, 0.06); transform: translateY(-5px); box-shadow: 0 0 25px rgba(255,227,179,0.15); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="top-canvas"></canvas>

    <div class="content-layer">
        <nav>
            <button onclick="window.switchPage('home')" id="btn-home" class="active">INDEX</button>
            <button onclick="window.switchPage('works')" id="btn-works">PROJECTS</button>
        </nav>

        <div id="home" class="page active">
            <h1 style="font-size: 4rem; letter-spacing: 12px; margin: 0; font-weight: 300; background: linear-gradient(135deg, #fff 30%, #FFE3B3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ZEKE'S STUDIO</h1>
            <p style="color: #555; margin-top: 12px; letter-spacing: 4px; font-size: 13px; text-transform: uppercase;">Aerodynamics & Structure Design</p>
        </div>

        <div id="works" class="page">
            <div class="grid">
                <div class="card" onclick="alert('Electric Motorcycle Analysis')"><h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px;">Electric Motorcycle</h3></div>
                <div class="card" onclick="alert('Modular Storage System')"><h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px;">Modular Storage</h3></div>
            </div>
        </div>
    </div>

    <script>
        window.switchPage = function(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.getElementById('btn-'+p).classList.add('active');
        };

        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const topCanvas = document.getElementById('top-canvas');
        const topCtx = topCanvas.getContext('2d');

        const dpr = window.devicePixelRatio || 1;
        let w = window.innerWidth;
        let h = window.innerHeight;

        function initCanvasSize() {
            w = window.innerWidth;
            h = window.innerHeight;
            bgCanvas.width = topCanvas.width = w * dpr;
            bgCanvas.height = topCanvas.height = h * dpr;
            bgCanvas.style.width = topCanvas.style.width = w + 'px';
            bgCanvas.style.height = topCanvas.style.height = h + 'px';
            bgCtx.scale(dpr, dpr);
            topCtx.scale(dpr, dpr);
        }
        initCanvasSize();
        window.addEventListener('resize', initCanvasSize);

        const particles = [];
        const totalParticles = 6000; 
        
        const colors = [
            '#FFE3B3', '#FFC563', '#0099FF', '#00FFFF', '#FFFFFF', 
            'rgba(255, 227, 179, 0.95)', 'rgba(0, 255, 255, 0.95)'
        ];
        
        let globalTime = 0;
        let lastTime = performance.now();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w; 
                this.y = Math.random() * h;
                
                const sizeRand = Math.random();
                if (sizeRand > 0.8) {
                    this.width = Math.random() * 5 + 3;  
                    this.height = Math.random() * 1.2 + 0.6;
                    this.velocity = Math.random() * 0.4 + 0.2;
                } else {
                    this.width = Math.random() * 2.5 + 1.2;    
                    this.height = Math.random() * 0.7 + 0.3;
                    this.velocity = Math.random() * 0.6 + 0.3; 
                }
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 0; 
                
                // 🎲 注入粒子独立种子，从根本上抹除任何方向的集体机械对齐
                this.seedX = Math.random() * 100;
                this.seedY = Math.random() * 100;
                
                this.ix = 0;
                this.iy = 0;
                this.vx = 0;
                this.vy = 0;
                this.rotation = 0;
            }
            
            update(mouse, time, dt, breathingRadius, currentFriction) {
                if (this.alpha < 1) this.alpha += 0.01 * dt; 

                // 🌌 纯有机全向自然流体算法：结合独立种子，360度各向同性任意发散开
                let angleX = Math.sin(this.x * 0.002 + time * 0.0004 + this.seedX);
                let angleY = Math.cos(this.y * 0.002 + time * 0.0003 + this.seedY);
                let baseAngle = (angleX + angleY) * Math.PI;

                let baseVx = Math.cos(baseAngle) * this.velocity;
                let baseVy = Math.sin(baseAngle) * this.velocity;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                let frictionMod = currentFriction;

                if (dist < breathingRadius && dist > 4) {
                    let force = (breathingRadius - dist) / breathingRadius;
                    
                    // 🧲 引力倍增（直扑光标）
                    let pull = force * 0.015 * dt; 
                    this.ix += dx * pull;
                    this.iy += dy * pull;

                    // 🌀 引力弹弓切线力：制造高级的绕流缠绕，产生极致的拉扯惯性
                    let swirl = force * 0.35 * dt;
                    this.ix += (-dy / dist) * swirl;
                    this.iy += (dx / dist) * swirl;

                    // 🏎️ 动态摩擦力消减：越接近中心，保留的速度惯性越恐怖，甩尾更疯狂
                    frictionMod = Math.pow(0.972 + force * 0.016, dt); 
                }

                this.ix *= frictionMod;
                this.iy *= frictionMod;

                // 综合速度向量
                this.vx = baseVx + this.ix;
                this.vy = baseVy + this.iy;

                this.x += this.vx * dt;
                this.y += this.vy * dt;

                if(this.x < -50 || this.x > w + 50 || this.y < -50 || this.y > h + 50) this.reset();
            }
            
            draw(ctx) {
                // 🧭 核心进化：让粒子角度完全咬合飞行航向，呈现顶级风洞流线感
                this.rotation = Math.atan2(this.vy, this.vx);

                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                
                // 🚀 核心进化：根据实时速度，动态拉伸长度（极速拉丝，慢速回归星尘）
                let currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                let stretch = 1 + Math.min(currentSpeed * 0.2, 4.0); 

                ctx.fillRect(-this.width * stretch / 2, -this.height / 2, this.width * stretch, this.height);
                ctx.restore();
            }
        }

        for (let i = 0; i < totalParticles; i++) particles.push(new Particle());

        let mouse = { x: -2000, y: -2000 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => { 
            const t = e.touches[0]; mouse.x = t.clientX; mouse.y = t.clientY; 
        }, { passive: true });

        window.addEventListener('touchend', () => { window.scrollTo(0, 0); });

        function animate() {
            let currentTime = performance.now();
            let dt = (currentTime - lastTime) / 16.666;
            
            if (dt > 2.0 || dt < 0.1 || isNaN(dt)) dt = 1.0; 
            lastTime = currentTime;

            globalTime += dt;
            
            bgCtx.fillStyle = 'rgba(3, 3, 7, 0.12)';
            bgCtx.fillRect(0, 0, w, h);
            
            topCtx.globalCompositeOperation = 'lighter';
            topCtx.clearRect(0, 0, w, h);

            let breathingRadius = 160 + Math.sin(globalTime * 0.002) * 90;
            let currentFriction = Math.pow(0.968, dt);

            particles.forEach(p => {
                p.update(mouse, globalTime, dt, breathingRadius, currentFriction);
                p.draw(topCtx);
            });

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
