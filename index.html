<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zeke's Design Studio</title>
    <style>
        :root { --accent-color: #FFE3B3; --text-color: #ffffff; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            position: fixed; overflow: hidden; overscroll-behavior: none; 
            background-color: #030307; color: white; 
            font-family: -apple-system, sans-serif; -webkit-overflow-scrolling: touch; 
        }
        
        #canvas-automation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        
        .content-layer { position: relative; z-index: 10; width: 100%; min-height: 100vh; pointer-events: none; }
        nav, .page { pointer-events: auto; }
        
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; z-index: 100; padding: 30px 0; background: linear-gradient(to bottom, rgba(3,3,7,1), rgba(3,3,7,0)); }
        nav button { background: none; border: none; color: #888; padding: 0 20px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; letter-spacing: 2px; }
        nav button.active, nav button:hover { color: var(--accent-color); text-shadow: 0 0 15px rgba(255,227,179,0.6); }
        
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; padding-top: 150px; text-align: center; 
            opacity: 0; pointer-events: none; transform: scale(0.97) translateY(15px); 
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity, transform; 
        }
        .page.active { opacity: 1; pointer-events: auto; transform: scale(1) translateY(0); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px 40px 60px 40px; max-width: 1000px; margin: 0 auto; max-height: calc(100vh - 240px); overflow-y: auto; overscroll-behavior: contain; }
        .grid::-webkit-scrollbar { display: none; }
        
        .card { 
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 30px; cursor: pointer; 
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease, background-color 0.3s ease; 
        }
        .card:hover { border-color: var(--accent-color); background: rgba(255, 227, 179, 0.04); transform: translateY(-5px); box-shadow: 0 0 30px rgba(255,227,179,0.1); }
    </style>
</head>
<body>

    <canvas id="canvas-automation"></canvas>

    <div class="content-layer">
        <nav>
            <button onclick="window.switchPage('home')" id="btn-home" class="active">INDEX</button>
            <button onclick="window.switchPage('works')" id="btn-works">PROJECTS</button>
        </nav>

        <div id="home" class="page active">
            <h1 style="font-size: 4rem; letter-spacing: 12px; margin: 0; font-weight: 300; background: linear-gradient(135deg, #fff 30%, #FFE3B3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ZEKE'S STUDIO</h1>
            <p style="color: #666; margin-top: 12px; letter-spacing: 4px; font-size: 13px; text-transform: uppercase;">Aerodynamics & Structure Design</p>
        </div>

        <div id="works" class="page">
            <div class="grid">
                <div class="card" onclick="alert('Electric Motorcycle Analysis')"><h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px;">Electric Motorcycle</h3></div>
                <div class="card" onclick="alert('Modular Storage System')"><h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px;">Modular Storage</h3></div>
            </div>
        </div>
    </div>

    <script>
        // 经典单页切换路由
        window.switchPage = function(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.getElementById('btn-'+p).classList.add('active');
        };

        const canvas = document.getElementById('canvas-automation');
        const ctx = canvas.getContext('2d');

        const dpr = window.devicePixelRatio || 1;
        let w = window.innerWidth;
        let h = window.innerHeight;

        function initCanvasSize() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.scale(dpr, dpr);
        }
        initCanvasSize();
        window.addEventListener('resize', initCanvasSize);

        // 高级气流混合色彩矩阵
        const colors = [
            'rgba(255, 227, 179, 0.85)', // 核心琥珀金
            'rgba(255, 197, 99, 0.7)',   // 渐变深金
            'rgba(0, 242, 255, 0.65)',   // 空气动力学冷蓝
            'rgba(255, 255, 255, 0.9)',  // 极速白流线
            'rgba(0, 153, 255, 0.5)'     // 边界层邃蓝
        ];

        // 精简粒子总数，配合空气动力学流态残影，视觉体验更高级且不失平滑
        const particles = [];
        const totalParticles = 1800; 
        
        let globalTime = 0;
        let lastTime = performance.now();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w; 
                this.y = Math.random() * h;
                
                // 优化尺寸分级：营造出景深和空气动力学测速粒子的微米级质感
                const sizeRand = Math.random();
                if (sizeRand > 0.85) {
                    this.width = Math.random() * 5 + 3;  
                    this.height = Math.random() * 1.2 + 0.6;
                    this.maxSpeed = Math.random() * 0.6 + 0.3;
                } else {
                    this.width = Math.random() * 2.5 + 1.2;    
                    this.height = Math.random() * 0.6 + 0.3;
                    this.maxSpeed = Math.random() * 0.9 + 0.4; 
                }
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.rotation = Math.random() * Math.PI * 2;
                this.alpha = 0; 
                
                // 物理加速向量机制
                this.vx = 0;
                this.vy = 0;
            }
            
            update(mouse, time, dt, breathingRadius) {
                // 极其温和优雅的渐现出生动画
                if (this.alpha < 1) this.alpha += 0.015 * dt; 

                // 1. 全局层：基础空气动力流场计算（降低频率使其更丝滑宏观）
                let flowAngle = Math.sin(time * 0.0004 + this.x * 0.0012) * Math.PI;
                let targetVx = Math.cos(flowAngle) * this.maxSpeed;
                let targetVy = Math.sin(flowAngle) * this.maxSpeed;

                // 2. 局部层：归一化矢量磁吸力 + 切向风洞涡流力（Vortex Mechanics）
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < breathingRadius && dist > 4) {
                    let force = (breathingRadius - dist) / breathingRadius; // 越靠近鼠标，力场响应越敏锐
                    
                    // 归一化方向向量
                    let dirX = dx / dist;
                    let dirY = dy / dist;
                    
                    // 完美的向心吸附速度叠向力
                    targetVx += dirX * force * 1.4;
                    targetVy += dirY * force * 1.4;
                    
                    // 注入核心切向涡流力：让粒子绕着鼠标优雅滑过（风洞效果流态）
                    targetVx += (-dirY) * force * 0.6;
                    targetVy += dirX * force * 0.6;
                }

                // 3. 缓动平滑计算（Easing）：彻底消除暴力瞬移和抖动突变
                this.vx += (targetVx - this.vx) * 0.06 * dt;
                this.vy += (targetVy - this.vy) * 0.06 * dt;

                this.x += this.vx * dt;
                this.y += this.vy * dt;

                // 越界空气动力学重置机制
                if(this.x < -20 || this.x > w + 20 || this.y < -20 || this.y > h + 20) this.reset();
                
                // 旋转速度自动匹配当前物理移动速率，呈现极强的动力学联动
                let currentVelocity = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                this.rotation += (0.01 + currentVelocity * 0.012) * dt;
            }
            
            draw(c) {
                c.save();
                c.globalAlpha = this.alpha;
                c.translate(this.x, this.y);
                c.rotate(this.rotation);
                c.fillStyle = this.color;
                // 高级硬件优化级标准渲染管线，精简性能消耗
                c.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                c.restore();
            }
        }

        // 初始化粒子池
        for (let i = 0; i < totalParticles; i++) particles.push(new Particle());

        // 交互监听
        let mouse = { x: -3000, y: -3000 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => { 
            const t = e.touches[0]; mouse.x = t.clientX; mouse.y = t.clientY; 
        }, { passive: true });
        window.addEventListener('mouseleave', () => { mouse.x = -3000; mouse.y = -3000; });
        window.addEventListener('touchend', () => { mouse.x = -3000; mouse.y = -3000; });

        // 核心动力主循环
        function animate() {
            let currentTime = performance.now();
            let dt = (currentTime - lastTime) / 16.666; // 自动适配 60Hz/120Hz/144Hz 屏幕
            if (dt > 2.0 || dt < 0.1 || isNaN(dt)) dt = 1.0; 
            lastTime = currentTime;

            globalTime += dt;
            
            // 核心残影渲染管线：利用特定复合比例覆盖，拉出丝绸般的高级 Ribbon 彩带
            ctx.fillStyle = 'rgba(3, 3, 7, 0.07)'; 
            ctx.fillRect(0, 0, w, h);
            
            // 开启高阶硬件级发光混合模式
            ctx.globalCompositeOperation = 'lighter';

            // 完美的呼吸式微扰动磁吸半径计算
            let breathingRadius = 140 + Math.sin(globalTime * 0.02) * 40;

            particles.forEach(p => {
                p.update(mouse, globalTime, dt, breathingRadius);
                p.draw(ctx);
            });

            // 回滚图层混合机制，确保不会影响上层文本交互及 UI 滤镜
            ctx.globalCompositeOperation = 'source-over';

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
