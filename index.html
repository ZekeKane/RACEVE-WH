<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zeke's Design Studio</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050508; color: white; font-family: 'Inter', system-ui, sans-serif; }
        
        /* 🎨 背景：添加 pointer-events: none 确保不阻挡鼠标点击，但依然能响应逻辑 */
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .content-layer { position: relative; z-index: 60; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        nav { position: fixed; top: 40px; display: flex; gap: 20px; pointer-events: auto; }
        nav button { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 12px 30px; cursor: pointer; border-radius: 50px; backdrop-filter: blur(10px); transition: 0.4s; }
        nav button:hover, nav button.active { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.3); transform: scale(1.05); }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            padding: 60px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            transition: 0.5s;
        }
        .glass-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.2); }

        h1 { font-size: 5rem; letter-spacing: 10px; margin-bottom: 10px; font-weight: 200; }
        p { color: rgba(255,255,255,0.6); letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content-layer">
        <nav>
            <button onclick="window.switchPage('home')" id="btn-home" class="active">STUDIO</button>
            <button onclick="window.switchPage('works')">WORKS</button>
        </nav>

        <div id="home" class="glass-card">
            <h1>ZEKE'S</h1>
            <p>FLUID & GLASS</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        let mouse = { x: -1000, y: -1000 };

        class Blob {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 250 + 150;
                // 使用更具光感的渐变色
                const colors = ['rgba(100, 200, 255, 0.2)', 'rgba(200, 230, 255, 0.15)', 'rgba(255, 255, 255, 0.08)'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                // 鼠标交互：让光斑缓慢追随鼠标，像水中的影子
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 400) {
                    this.vx += (dx / dist) * 0.02;
                    this.vy += (dy / dist) * 0.02;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;

                if (this.x < -200 || this.x > w + 200) this.vx *= -1;
                if (this.y < -200 || this.y > h + 200) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const blobs = [];
        for (let i = 0; i < 6; i++) blobs.push(new Blob());

        // 监听全局鼠标，不再受限于 Canvas 的层级
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function animate() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, w, h);
            
            // 使用 lighter 让光斑重叠处产生“透亮”感
            ctx.globalCompositeOperation = 'lighter';
            
            blobs.forEach(b => {
                b.update();
                b.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
