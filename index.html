<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zeke's Design Studio</title>
    <style>
        :root { --accent-color: #FFE3B3; --text-color: #ffffff; }
        
        /* 🛑 核心修改：锁定 html 和 body，彻底根除橡皮筋黑边 */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            position: fixed; /* 强行锁定视口，使其表现得像原生 iPad App */
            overflow: hidden; /* 禁止全局出现任何滚动条 */
            overscroll-behavior: none; /* 彻底禁用全局上下拉回弹效果 */
            background-color: #030307; 
            color: white; 
            font-family: -apple-system, sans-serif; 
            -webkit-overflow-scrolling: touch; 
        }
        
        #bg-canvas, #top-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #bg-canvas { z-index: 0; }
        #top-canvas { z-index: 50; } 
        
        .content-layer { position: relative; z-index: 60; width: 100%; min-height: 100vh; pointer-events: none; }
        
        nav, .page { pointer-events: auto; }
        
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; z-index: 100; padding: 30px 0; background: linear-gradient(to bottom, rgba(3,3,7,1), rgba(3,3,7,0)); }
        nav button { background: none; border: none; color: #888; padding: 0 20px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; letter-spacing: 2px; }
        nav button.active, nav button:hover { color: var(--accent-color); text-shadow: 0 0 15px rgba(255,227,179,0.6); }
        
        .page { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            padding-top: 150px; 
            text-align: center; 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(0.97) translateY(15px); 
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity, transform; 
        }
        
        .page.active { 
            opacity: 1; 
            pointer-events: auto; 
            transform: scale(1) translateY(0); 
        }
        
        /* 💎 智能局部滚动网格（完美兼顾炫技与未来作品增多的实用性） */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 20px 40px 60px 40px; 
            max-width: 1000px; 
            margin: 0 auto; 
            max-height: calc(100vh - 240px); /* 减去顶部导航和留白，精确计算剩余高度 */
            overflow-y: auto; /* 如果以后卡片塞满了，允许在毛玻璃区域内精准内部滚动 */
            overscroll-behavior: contain; /* 滚动到头时，绝对不把滚动惯性传递给背景层 */
            -webkit-overflow-scrolling: touch;
        }
        /* 隐藏局部滚动时略显累赘的滚动条，让界面更纯净 */
        .grid::-webkit-scrollbar { display: none; }
        
        .card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 20px; 
            padding: 30px; 
            cursor: pointer; 
            touch-action: auto; 
            transform: translateZ(0); 
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease, background-color 0.3s ease; 
        }
        .card:hover { border-color: var(--accent-color); background: rgba(255, 227, 179, 0.06); transform: translateY(-5px); box-shadow: 0 0 25px rgba(255,227,179,0.15); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="top-canvas"></canvas>

    <div class="content-layer">
        <nav>
            <button onclick="window.switchPage('home')" id="btn-home" class="active">INDEX</button>
            <button onclick="window.switchPage('works')" id="btn-works">PROJECTS</button>
        </nav>

        <div id="home" class="page active">
            <h1 style="font-size: 4rem; letter-spacing: 12px; margin: 0; font-weight: 300; background: linear-gradient(135deg, #fff 30%, #FFE3B3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ZEKE'S STUDIO</h1>
            <p style="color: #555; margin-top: 12px; letter-spacing: 4px; font-size: 13px; text-transform: uppercase;">Aerodynamics & Structure Design</p>
        </div>

        <div id="works" class="page">
            <div class="grid">
                <div class="card" onclick="alert('Electric Motorcycle Analysis')"><h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px;">Electric Motorcycle</h3></div>
                <div class="card" onclick="alert('Modular Storage System')"><h3 style="color: #FFE3B3; font-weight: 400; letter-spacing: 1px;">Modular Storage</h3></div>
            </div>
        </div>
    </div>

    <script>
        window.switchPage = function(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.getElementById('btn-'+p).classList.add('active');
        };

        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const topCanvas = document.getElementById('top-canvas');
        const topCtx = topCanvas.getContext('2d');

        const dpr = window.devicePixelRatio || 1;
        let w = window.innerWidth;
        let h = window.innerHeight;

        function initCanvasSize() {
            w = window.innerWidth;
            h = window.innerHeight;
            bgCanvas.width = topCanvas.width = w * dpr;
            bgCanvas.height = topCanvas.height = h * dpr;
            bgCanvas.style.width = topCanvas.style.width = w + 'px';
            bgCanvas.style.height = topCanvas.style.height = h + 'px';
            bgCtx.scale(dpr, dpr);
            topCtx.scale(dpr, dpr);
        }
        initCanvasSize();
        window.addEventListener('resize', initCanvasSize);

        const particles = [];
        const totalParticles = 6000; 
        
        const colors = [
            '#FFE3B3', '#FFC563', '#0099FF', '#00FFFF', '#FFFFFF', 
            'rgba(255, 227, 179, 0.95)', 'rgba(0, 255, 255, 0.95)'
        ];
        let globalTime = 0;

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w; 
                this.y = Math.random() * h;
                
                const sizeRand = Math.random();
                if (sizeRand > 0.8) {
                    this.width = Math.random() * 6 + 4;  
                    this.height = Math.random() * 1.5 + 0.8;
                    this.velocity = Math.random() * 0.5 + 0.2;
                } else {
                    this.width = Math.random() * 3 + 1.5;    
                    this.height = Math.random() * 0.8 + 0.4;
                    this.velocity = Math.random() * 0.7 + 0.4; 
                }
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.rotation = Math.random() * Math.PI * 2;
                this.angle = Math.random() * Math.PI * 2;
                
                this.ix = 0;
                this.iy = 0;
                this.alpha = 0; 
            }
            update(mouse, time) {
                if (this.alpha < 1) this.alpha += 0.008; 

                this.angle = Math.sin(time * 0.0008 + this.x * 0.0015) * Math.PI;
                let baseVx = Math.cos(this.angle) * this.velocity;
                let baseVy = Math.sin(this.angle) * this.velocity;

                let breathingRadius = 160 + Math.sin(time * 0.002) * 90;
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < breathingRadius) {
                    let force = (breathingRadius - dist) / breathingRadius;
                    this.ix += dx * force * 0.0025; 
                    this.iy += dy * force * 0.0025;
                }

                this.ix *= 0.94; 
                this.iy *= 0.94;

                this.x += baseVx + this.ix;
                this.y += baseVy + this.iy;

                if(this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
                
                this.rotation += 0.015 + (Math.abs(this.ix) + Math.abs(this.iy)) * 0.004;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                ctx.restore();
            }
        }

        for (let i = 0; i < totalParticles; i++) particles.push(new Particle());

        let mouse = { x: -2000, y: -2000 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => { 
            const t = e.touches[0]; mouse.x = t.clientX; mouse.y = t.clientY; 
        }, { passive: true });

        // 🛑 核心微调：在极其激烈的滑动拖拽下，利用系统的 touchend 事件兜底清除潜在的浏览器视口偏移
        window.addEventListener('touchend', () => { window.scrollTo(0, 0); });

        function animate() {
            globalTime++;
            
            bgCtx.fillStyle = 'rgba(3, 3, 7, 0.12)';
            bgCtx.fillRect(0, 0, w, h);
            
            topCtx.globalCompositeOperation = 'lighter';
            topCtx.clearRect(0, 0, w, h);

            particles.forEach(p => {
                p.update(mouse, globalTime);
                p.draw(topCtx);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
