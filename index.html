<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeke's Design Studio</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050508; font-family: sans-serif; }
        #bg-canvas, #top-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #bg-canvas { z-index: 0; }
        .glass-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); background: rgba(0,0,0,0.2); }
        #top-canvas { z-index: 50; pointer-events: none; }
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; z-index: 100; padding: 20px 0; }
        button { background: none; border: none; color: #fff; padding: 0 20px; cursor: pointer; font-weight: 600; opacity: 0.7; }
        button:hover { opacity: 1; }
        .page { display: none; height: 100vh; padding-top: 150px; text-align: center; color: white; position: relative; z-index: 10; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="glass-background"></div>
    <canvas id="top-canvas"></canvas>

    <nav>
        <button onclick="switchPage('home')" id="btn-home">INDEX</button>
        <button onclick="switchPage('works')" id="btn-works">PROJECTS</button>
    </nav>

    <div id="home" class="page active">
        <h1 style="font-size: 3rem; letter-spacing: 5px;">ZEKE'S STUDIO</h1>
    </div>

    <script>
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const topCanvas = document.getElementById('top-canvas');
        const topCtx = topCanvas.getContext('2d');

        let w = bgCanvas.width = topCanvas.width = window.innerWidth;
        let h = bgCanvas.height = topCanvas.height = window.innerHeight;

        const particles = [];
        const totalParticles = 6000; // 优化至 6000，保障流畅度
        const colors = ['#FF007F', '#00F2FF', '#8A2BE2', '#FFD700', '#7FFF00']; // 鲜艳色系

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 1.5 + 0.5; // 适当放大，增加可见度
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 0.5 + 0.2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update(mouse) {
                // 丝绸流动：正弦波带来的连贯性
                this.angle += 0.01;
                this.x += Math.cos(this.angle) * this.velocity;
                this.y += Math.sin(this.angle) * this.velocity;

                // 超强吸附与互动
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 400) {
                    let force = (400 - dist) / 400;
                    this.x += dx * force * 0.2; // 极速吸附
                    this.y += dy * force * 0.2;
                }

                if(this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < totalParticles; i++) particles.push(new Particle());

        let mouse = { x: -1000, y: -1000 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function animate() {
            // 背景层做一点点拖尾，营造流动感
            bgCtx.fillStyle = 'rgba(5, 5, 8, 0.2)';
            bgCtx.fillRect(0, 0, w, h);
            
            // 关键优化：开启混合模式，粒子重叠处自动发光
            topCtx.globalCompositeOperation = 'lighter';
            topCtx.clearRect(0, 0, w, h);

            particles.forEach(p => {
                p.update(mouse);
                p.draw(topCtx);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
